<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

/* 🔥 No Scroll */
html, body{
  height:100%;
  overflow:hidden;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#e9e9e9;
  height:120px;
  padding:0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo-container{
  height:100%;
  display:flex;
  align-items:center;
}

.logo-container img{
  height:150px;
  object-fit:contain;
}

.page-title{
  font-size:26px;
  font-weight:700;
  color:#1b4d1b;
}

/* WRAPPER */
.wrapper{
  width:85%;
  height:calc(100vh - 160px);
  margin:20px auto;
  background:white;
  padding:150px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
}

/* GREEN CARD */
.inner-card{
  background:#7f8f77;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  top:-70px;
}

.inner-header{
  background:#0b3d0b;
  color:white;
  padding:18px 25px;
  font-weight:700;
}

.inner-content{
  padding:40px 60px 60px;
  color:white;
}

/* INPUT GROUP */
.input-group{
  position:relative;
  margin-bottom:25px;
}

.input-field{
  width:100%;
  padding:14px 50px 14px 18px;
  border-radius:25px;
  border:none;
  font-size:14px;
  outline:none;
}

.eye-icon{
  position:absolute;
  right:18px;
  top:65%;
  transform:translateY(-50%);
  width:20px;
  cursor:pointer;
}

/* PASSWORD NOTE */
.password-note{
  display:flex;
  align-items:flex-start;
  gap:10px;
  font-size:12px;
  margin-top:5px;
}

.password-note img{
  width:20px;
  
}

/* BUTTONS */
.button-group{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:35px;
}

.btn{
  padding:10px 30px;
  border:none;
  border-radius:25px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

.btn-green{
  background:#0b3d0b;
  color:white;
  border:solid white 1px;
}

.btn-green:hover{
  background:#145214;
}

.btn-red{
  background:#ff3b3b;
  color:white;
  border:solid white 1px;
}

.btn-red:hover{
  background:#e52d2d;
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-container">
    <img src="img/antel-logo.png" alt="">
  </div>
  <div class="page-title">FORGOT PASSWORD</div>
</div>

<!-- MAIN -->
<div class="wrapper">

  <div class="inner-card">

    <div class="inner-header">
      RESET PASSWORD
    </div>

    <div class="inner-content">

      <!-- NEW PASSWORD -->
      <div class="input-group">
        <label>Enter new password</label>
        <input type="password" class="input-field" id="newPassword">
        <img src="img/toggle-eye-button.png" class="eye-icon" onclick="togglePassword('newPassword')" alt="">
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="input-group">
        <label>Confirmed new password</label>
        <input type="password" class="input-field" id="confirmPassword">
        <img src="img/toggle-eye-button.png" class="eye-icon" onclick="togglePassword('confirmPassword')" alt="">
      </div>

      <!-- PASSWORD NOTE -->
      <div class="password-note">
        <img src="img/note-logo-white.png" alt="">
        <span>
          A strong password should use at least 12 characters and include uppercase and lowercase letters, numbers, and symbols (e.g., !, @, #, $, %).
        </span>
      </div>

      <!-- BUTTONS -->
      <div class="button-group">
        <button class="btn btn-red" onclick="clearFields()">CLEAR ALL</button>
        <button class="btn btn-green" onclick="confirmReset()">CONFIRM</button>
      </div>

    </div>

  </div>

</div>

<script>

function togglePassword(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

function clearFields(){
  document.getElementById("newPassword").value="";
  document.getElementById("confirmPassword").value="";
}

function confirmReset(){
  const newPass = document.getElementById("newPassword").value;
  const confirmPass = document.getElementById("confirmPassword").value;

  if(newPass.length < 12){
    alert("Password must be at least 12 characters.");
    return;
  }

  if(newPass !== confirmPass){
    alert("Passwords do not match.");
    return;
  }

  alert("Password successfully reset (simulation).");
  // window.location.href = "login.html"; // enable later
}

</script>

</body>
</html>
