<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#e5e5e5;
overflow:hidden;
}

/* HEADER */

.header{
height:85px;
background:#e9e9e9;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.header-left{
display:flex;
align-items:center;
gap:15px;
}

.header-logo{width:110px;}

.header-left h2{
color:#103703;
font-weight:700;
font-size:22px;
}

.header-right{
display:flex;
align-items:center;
gap:15px;
}

.search-container{
display:flex;
align-items:center;
background:#82F65B33;
padding:8px 16px;
border-radius:25px;
gap:8px;
width:280px;
border:1px solid #103703;
}

.search-container input{
border:none;
background:transparent;
outline:none;
width:100%;
}

.icon-circle{
width:40px;
height:40px;
background:#D9D9D9;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #82F65B;
}

.icon-circle img{width:26px;}

/* MAIN */

.main{
height:calc(100vh - 85px);
display:flex;
align-items:center;
justify-content:center;
padding:15px 30px;
}

/* CARD */

.card{
width:1100px;
background:#f4f4f4;
border-radius:28px;
padding:35px 60px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* TITLE */

.title{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:700;
color:#1b4d1b;
margin-bottom:18px;
}

/* PROGRESS */

.progress-bar{
height:18px;
background:#0b3d02;
border-radius:40px;
overflow:hidden;
margin-bottom:10px;
}

.progress-fill{
width:65%;
height:100%;
background:linear-gradient(90deg,#6BE34F,#2fb500);
}

/* STEPS */

.steps{
display:flex;
justify-content:space-between;
margin-bottom:25px;
font-size:14px;
}

.step-item{
display:flex;
align-items:center;
gap:8px;
color:#1b4d1b;
}

.step-item img{
width:20px;
}

/* SELECT */

.select-text{
margin-bottom:18px;
font-weight:600;
font-size:16px;
color:#103703;
}

/* CALENDAR */

.calendar-box{
width:420px;
background:white;
border-radius:18px;
padding:22px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
font-weight:600;
font-size:17px;
color:#103703;
}

.nav-btn{
cursor:pointer;
font-size:20px;
color:#888;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
text-align:center;
font-size:13px;
}

.day{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
border-radius:50%;
cursor:pointer;
}

.available{
background:#82F65B;
}

.selected{
background:#FFD400 !important;
}

.day:hover{
background:#e7ffd9;
}

/* LEGEND */

.legend{
display:flex;
gap:35px;
margin-top:18px;
font-size:13px;
}

.legend div{
display:flex;
align-items:center;
gap:8px;
}

/* NOTE + BUTTON */

.note-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.book-btn{
background:#0b3d02;
color:white;
padding:14px 90px;
border-radius:22px;
font-weight:600;
border:solid;
border-color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 4px 0 #072900;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="header-left">
<img src="img/antel-logo.png" class="header-logo">
<h2>Book Appointment</h2>
</div>

<div class="header-right">

<div class="search-container">
<img src="img/Search.png" width="16">
<input type="text" placeholder="Search">
<img src="img/ex-button.png" width="16">
</div>

<div class="icon-circle"><img src="img/Ring bell.png"></div>
<div class="icon-circle"><img src="img/profile-logo.png"></div>

</div>
</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<div class="title">
<img src="Personal Info.png" width="38">
<span>Move-In/Out Clearance</span>
</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

<div class="steps">

<div class="step-item">
<img src="img/one-logo.png">
<span>Information Form</span>
</div>

<div class="step-item">
<img src="img/two-logo.png">
<span>Move-Out Clearance Form</span>
</div>

<div class="step-item">
<img src="img/three-logo.png">
<span>Book Appointment</span>
</div>

</div>

<div class="select-text">Select available date:</div>

<div style="display:flex;gap:80px;align-items:center">

<div class="calendar-box">

<div class="calendar-header">
<span class="nav-btn" onclick="changeMonth(-1)">&#10094;</span>
<span id="monthYear"></span>
<span class="nav-btn" onclick="changeMonth(1)">&#10095;</span>
</div>

<div class="calendar-grid" id="calendar"></div>

</div>

</div>

<div class="legend">

<div>
<div style="width:18px;height:18px;background:#82F65B;border-radius:50%;"></div>
Available
</div>

<div>
<div style="width:18px;height:18px;background:#FFD400;border-radius:50%;"></div>
Selected
</div>

</div>

<div class="note-row">

<p style="font-size:12px;color:#777;">
Note: Office Hours Monday to Saturday from 8:00 AM to 5:00PM only
</p>

<button class="book-btn">Book</button>

</div>

</div>
</div>

<script>

const calendar = document.getElementById("calendar");
const monthYear = document.getElementById("monthYear");

let currentDate = new Date();

const availableDates = [15,16,17,18,19]; 

function renderCalendar(){

calendar.innerHTML="";

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

const firstDay=new Date(year,month,1).getDay();
const lastDate=new Date(year,month+1,0).getDate();

const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];

monthYear.textContent=monthNames[month]+" "+year;

const weekDays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

weekDays.forEach(day=>{
const div=document.createElement("div");
div.textContent=day;
div.style.fontWeight="600";
calendar.appendChild(div);
});

for(let i=0;i<firstDay;i++){
calendar.appendChild(document.createElement("div"));
}

for(let day=1;day<=lastDate;day++){

const dayDiv=document.createElement("div");

dayDiv.classList.add("day");

if(availableDates.includes(day)){
dayDiv.classList.add("available");

dayDiv.onclick=()=>{
document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
dayDiv.classList.add("selected");
};
}

dayDiv.textContent=day;

calendar.appendChild(dayDiv);

}

}

function changeMonth(direction){

currentDate.setMonth(currentDate.getMonth()+direction);

renderCalendar();

}

renderCalendar();

</script>

</body>
</html>
