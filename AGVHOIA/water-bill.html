<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Bills</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#e5e5e5;
}

/* ================= HEADER ================= */
.header{
  height:90px;
  background:#e9e9e9;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.header-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.header-logo{
  width:115px;
  margin-left:-20px;
}

.header-left h2{
  color:#103703;
  font-weight:700;
  margin-left:100px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.search-container{
  display:flex;
  align-items:center;
  background:#82F65B33;
  padding:8px 15px;
  border-radius:25px;
  gap:10px;
  width:320px;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border:1px solid #103703;
}

.search-container input{
  border:none;
  background:transparent;
  outline:none;
  width:100%;
}

.search-icon,
.search-close{
  width:18px;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon-circle{
  width:45px;
  height:45px;
  background:#D9D9D9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border:2px solid #82F65B;
}

.icon-circle img{
  width:35px;
}

/* ================= LAYOUT ================= */
.container{
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  background:#eeeeee;
  height:calc(100vh - 90px);
  padding:30px 15px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #dcdcdc;
}

.sidebar-menu{
  flex:1;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-radius:20px;
  margin-bottom:20px;
  cursor:pointer;
  font-size:15px;
  transition:0.2s ease;
}

.menu-item img{
  width:28px;
}

.menu-item span{
  font-weight:500;
  color:#2f2f2f;
}

.menu-item:hover{
  background:#d7f0d4;
}

.menu-item.active{
  background:#cfe9c9;
  font-weight:600;
  box-shadow:0 4px 8px rgba(0,0,0,0.12);
}

.sidebar-logout{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-top:1px solid #dcdcdc;
  cursor:pointer;
}

.sidebar-logout img{
  width:26px;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:30px;
}

/* ================= WATER SECTION ================= */

.water-container{
  background:#f4f4f4;
  border-radius:25px;
  padding:40px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
  min-height:620px;
}

.water-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.water-title{
  display:flex;
  align-items:center;
  gap:15px;
}

.balance-box{
  background:#cfe9c9;
  padding:25px;
  border-radius:25px;
  width:450px;
  height:150px;
  text-align:right;
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
}

.balance-box p{
  margin-bottom:5px;
}

.balance-box h2{
  font-size:30px;
  color:#103703;
  font-weight:700;
}

.pay-btn{
  margin-top:15px;
  padding:10px 30px;
  border:none;
  border-radius:25px;
  background:#103703;
  color:white;
  cursor:pointer;
  transition:0.2s ease;
}

.pay-btn:hover{
  background:#0c2b02;
  transform:scale(1.05);
}

/* ================= PAYMENT HISTORY ================= */

.history-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin:40px 0 20px 0;
}

.history-header img{
  width:18px;
}

.history-item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:18px;
  background:white;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 4px 8px rgba(0,0,0,0.08);
}

.history-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.history-logo{
  width:45px;
  border-radius:10px;
}

.history-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
}

.amount{
  font-weight:600;
  color:#103703;
}

.bottom-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.receipt-btn{
  padding:6px 14px;
  border-radius:15px;
  background:#e8f6e6;
  border:1px solid #103703;
  font-size:13px;
  cursor:pointer;
}

.arrow-icon{
  width:18px;
}

.logout-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.logout-modal.active{
  visibility:visible;
  opacity:1;
}

.logout-box{
  width:520px;
  background:#e8e8e8;
  border-radius:20px;
  padding:40px;
  text-align:center;
  border:3px solid #7CFF57;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.logout-box h2{
  color:#103703;
  margin-bottom:25px;
}

.logout-logo{
  width:230px;
  margin-bottom:15px;
}

.logout-buttons{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.logout-buttons button{
  border:solid;
  border-color:white;
  padding:12px 35px;
  border-radius:25px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
}

.btn-yes{
  background:#0f3d00;
  color:white;
}

.btn-no{
  background:#ff3b3b;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="img/antel-logo.png" class="header-logo">
    <h2>Monthly Bills</h2>
  </div>

  <div class="header-right">
    <div class="search-container">
      <img src="img/Search.png" class="search-icon">
      <input type="text" placeholder="Search">
      <img src="img/edit-button.png" class="search-close">
    </div>

    <div class="header-icons">
      <div class="icon-circle"><img src="img/Ring bell.png"></div>
      <div class="icon-circle"><img src="img/profile-logo.png"></div>
    </div>
  </div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-menu">

    <a href="dashboard.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item active">
        <img src="img/Dashboard.png">
        <span>Dashboard</span>
      </div>
    </a>

    <a href="monthly-bills.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="IMG/Due Bill.png">
        <span>Monthly Bills</span>
      </div>
    </a>

    <a href="book-appointment.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="ImG/Book apoinment.png">
        <span>Book Appointment</span>
      </div>
    </a>

    <a href="memberships.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Memberships.png">
        <span>Memberships</span>
      </div>
    </a>

    <a href="concerns.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Personal Info.png">
        <span>Other Concerns</span>
      </div>
    </a>

    <a href="help.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Help.png">
        <span>Help</span>
      </div>
    </a>

    <a href="settings.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Settings.png">
        <span>Settings</span>
      </div>
    </a>

  </div>

  <div class="sidebar-logout" id="logoutBtn">
  <img src="img/logout-button.png"><span>Logout</span>
</div>

</div>

<!-- MAIN -->
<div class="main">
  <div class="water-container">

    <div class="water-header">
      <div class="water-title">
        <img src="img/Water Bill.png" style="width:35px;">
        <h3>Water Bills</h3>
      </div>

      <div class="balance-box">
        <p>Current Balance:</p>
        <h2 id="balanceAmount">₱ 0.00</h2>
        <button class="pay-btn" onclick="goToPayment()">Pay</button>
      </div>
    </div>

    <div class="history-header">
      <img src="img/history-logo.png">
      <h4>Payment History</h4>
    </div>

    <div class="history-item">
      <div class="history-left">
        <img src="img/payment-history-logo.png" class="history-logo">
        <strong>June 2026 Bill</strong>
      </div>

      <div class="history-right">
        <div class="amount">₱ 0.00</div>

        <div class="bottom-actions">
          <button class="receipt-btn">Official Receipt</button>
          <img src="img/right-arrow-button.png" class="arrow-icon">
        </div>
      </div>
    </div>

  </div>
</div>

</div>

<div class="logout-modal" id="logoutModal">
  <div class="logout-box">
    <h2>Would you like to Logout?</h2>
    <img src="img/antel-logo.png" class="logout-logo">
    <div class="logout-buttons">
      <button class="btn-yes" onclick="confirmLogout()">YES</button>
      <button class="btn-no" onclick="closeLogout()">NO</button>
    </div>
  </div>
</div>

<script>
const logoutBtn = document.getElementById("logoutBtn");
const logoutModal = document.getElementById("logoutModal");

logoutBtn.onclick = function(){
  logoutModal.classList.add("active");
}

function closeLogout(){
  logoutModal.classList.remove("active");
}

function confirmLogout(){
  window.location.href="login.html";
}

function goToPayment(){
  window.location.href = "water-bill-pay.html";
}
</script>

</body>
</html>
