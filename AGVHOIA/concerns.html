<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#e5e5e5;
}

/* ================= HEADER ================= */
.header{
  height:90px;
  background:#e9e9e9;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.header-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.header-logo{
  width:115px;
  margin-left:-20px;
}

.header-left h2{
  color:#103703;
  font-weight:700;
  margin-left:100px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.search-container{
  display:flex;
  align-items:center;
  background:#82F65B33;
  padding:8px 15px;
  border-radius:25px;
  gap:10px;
  width:320px;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border:solid;
  border-color:#103703;
}

.search-container input{
  border:none;
  background:transparent;
  outline:none;
  width:100%;
}

.search-icon,
.search-close{
  width:18px;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon-circle{
  width:45px;
  height:45px;
  background:#D9D9D9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border:solid;
  border-color:#82F65B;
}

.icon-circle img{
  width:35px;
}

/* ================= LAYOUT ================= */
.container{
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  background:#eeeeee;
  height:calc(100vh - 90px);
  padding:30px 15px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #dcdcdc;
}

.sidebar-menu{
  flex:1;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-radius:20px;
  margin-bottom:20px;
  cursor:pointer;
  font-size:15px;
  transition:0.2s ease;
}

.menu-item img{
  width:28px;
}

.menu-item span{
  font-weight:500;
  color:#2f2f2f;
}

.menu-item:hover{
  background:#d7f0d4;
}

.menu-item.active{
  background:#cfe9c9;
  font-weight:600;
  box-shadow:0 4px 8px rgba(0,0,0,0.12);
}

.sidebar-logout{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-top:1px solid #dcdcdc;
  cursor:pointer;
}

.sidebar-logout img{
  width:26px;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:40px;
}

/* ================= CONCERNS CARD ================= */
.concern-card{
  background:#f4f4f4;
  border-radius:22px;
  padding:30px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.concern-title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  font-weight:700;
  color:#1b4d1b;
  margin-bottom:20px;
}

.concern-title img{
  width:35px;
}

.concern-box{
  background:#cfe9c9;
  min-height:220px;
  border-radius:18px;
  padding:20px;
  border:none;
  width:100%;
  outline:none;
  font-size:14px;
  resize:both;
  overflow:auto;
}

.upload-btn{
  margin-top:20px;
  background:#103703;
  color:white;
  padding:12px 25px;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  border:none;
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.upload-btn img{
  width:20px;
}

.action-buttons{
  display:flex;
  justify-content:flex-end;
  gap:20px;
  margin-top:40px;
}

.delete-btn{
  width:60px;
  height:50px;
  border-radius:12px;
  border:2px solid red;
  background:white;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
}

.delete-btn img{
  width:22px;
}

.next-btn{
  background:#103703;
  color:white;
  padding:14px 45px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  border:none;
}

/* ===== SMALL NOTE TEXT ===== */
.other-note{
  margin-top:15px;
  font-size:12px;
  color:#7a7a7a;
}

.other-note a{
  color:#5b8a4f;
  text-decoration:underline;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <img src="img/antel-logo.png" class="header-logo">
    <h2>Book Appointment</h2>
  </div>

  <div class="header-right">
    <div class="search-container">
      <img src="img/Search.png" class="search-icon">
      <input type="text" placeholder="Search">
      <img src="img/ex-button.png" class="search-close">
    </div>

    <div class="header-icons">
      <div class="icon-circle"><img src="img/Ring bell.png"></div>
      <div class="icon-circle"><img src="img/profile-logo.png"></div>
    </div>
  </div>
</div>

<div class="container">

<div class="sidebar">
  <div class="sidebar-menu">

    <a href="dashboard.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Dashboard.png">
        <span>Dashboard</span>
      </div>
    </a>

    <a href="monthly-bills.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Due Bill.png">
        <span>Monthly Bills</span>
      </div>
    </a>

    <a href="book-appointment.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Book apoinment.png">
        <span>Book Appointment</span>
      </div>
    </a>

    <a href="memberships.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Memberships.png">
        <span>Memberships</span>
      </div>
    </a>

    <a href="concerns.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item active">
        <img src="img/Personal Info.png">
        <span>Other Concerns</span>
      </div>
    </a>

    <a href="help.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Help.png">
        <span>Help</span>
      </div>
    </a>

    <a href="settings.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item">
        <img src="img/Settings.png">
        <span>Settings</span>
      </div>
    </a>

  </div>

  <div class="sidebar-logout" id="logoutBtn">
  <img src="img/logout-button.png"><span>Logout</span>
</div>
</div>

<div class="main">
  <div class="concern-card">

    <div class="concern-title">
      <img src="img/concerns-logo.png">
      <span>Concerns</span>
    </div>

    <textarea class="concern-box" placeholder="Type your concern here..."></textarea>

    <button class="upload-btn">
      <img src="img/upload-receipt-button.png">
      <span>Upload Files</span>
    </button>

    <div class="action-buttons">
      <button class="delete-btn">
        <img src="img/delete-button.png">
      </button>
      <button class="next-btn">Next</button>
    </div>

    <!-- NOTE -->
    <p class="other-note">
      Others: Book an appointment with the AGV Property Management Admin for a personal visit.
      <a href="book-appointment-complain.html">Click here.</a>
    </p>

  </div>
</div>

</div>

</body>
</html>
