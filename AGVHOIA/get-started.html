<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #ffffff 60%, #8ce26f);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    /* IMAGE STYLE */
    .main-image {
      width: 580px;
      max-width: 100%;
      margin-bottom: 40px;
    }

    /* BUTTON */
    .btn {
      padding: 15px 45px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 40px;
      border: solid;
      border-color: white;
      background: #0f3d0f;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #145214;
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.97);
    }

    @media (max-width: 600px) {
      .main-image {
        width: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- PUT YOUR IMAGE FILE NAME HERE -->
    <img src="img/antel-logo.png" alt="Village Logo" class="main-image">

    <br>

    <button class="btn" onclick="goNext()">GET STARTED</button>

  </div>

  <script>
    function goNext() {
      window.location.href = "login.html"; // change this if needed
    }
  </script>

</body>
</html>
