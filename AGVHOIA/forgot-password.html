<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

/* 🔥 REMOVE SCROLL ONLY */
html, body{
  height:100%;
  overflow:hidden;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#e9e9e9;
  height:120px;
  padding:0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  overflow:hidden;
}

.logo-container{
  height:100%;
  display:flex;
  align-items:center;
}

.logo-container img{
  height:150px;
  width:auto;
  object-fit:contain;
}

.page-title{
  font-size:26px;
  font-weight:700;
  color:#1b4d1b;
}

/* MAIN CARD */
.wrapper{
  width:85%;
  height:calc(100vh - 160px);
  margin:20px auto;
  background:white;
  padding:150px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
}

.inner-card{
  background:#7f8f77;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  top:-70px;
}

.inner-header{
  background:#0b3d0b;
  color:white;
  padding:18px 25px;
  font-weight:700;
}

.inner-content{
  padding:30px 40px 40px;
  color:white;
}

/* INPUT */
.input-field{
  width:100%;
  padding:12px 15px;
  border-radius:20px;
  border:none;
  margin:15px 0 5px;
  font-size:14px;
  outline:none;
}

/* 🔴 Error Style */
.input-error{
  border:2px solid #ff3b3b;
}

.error-message{
  font-size:12px;
  color:#ffdddd;
  margin-bottom:10px;
  display:none;
}

/* BUTTONS */
.button-group{
  display:flex;
  gap:15px;
  justify-content:flex-end;
  margin-bottom:25px;
}

.btn{
  padding:8px 22px;
  border:none;
  border-radius:25px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

.btn-green{
  background:#0b3d0b;
  color:white;
  border: solid white 1px;
}

.btn-green:hover{
  background:#145214;
}

.btn-red{
  background:#ff3b3b;
  color:white;
  border: solid white 1px;
}

.btn-red:hover{
  background:#e52d2d;
}

/* OTP */
.otp-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin:20px 0 10px;
}

.otp-input{
  width:55px;
  height:55px;
  border-radius:10px;
  border:none;
  text-align:center;
  font-size:20px;
}

.resend{
  font-size:13px;
  margin-top:10px;
  text-align:right;
  width:100%;
}

.verify-group{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:25px;
}

</style>
</head>
<body>

<div class="header">
  <div class="logo-container">
    <img src="img/antel-logo.png" alt="">
  </div>
  <div class="page-title">FORGOT PASSWORD</div>
</div>

<div class="wrapper">

  <div class="inner-card">

    <div class="inner-header">
      FIND YOUR ACCOUNT
    </div>

    <div class="inner-content">

      <p>Enter your email address to find your account.</p>

      <input type="email" class="input-field" id="email" placeholder="Enter your email">
      <div class="error-message" id="emailError"></div>

      <div class="button-group">
        <button class="btn btn-red" onclick="clearEmail()">CLEAR</button>
        <button class="btn btn-green" onclick="sendOTP()">SEND OTP</button>
      </div>

      <p>Enter the 6 digits OTP sent to your email to reset your account.</p>

      <div class="otp-container">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
      </div>

      <div class="resend">
        Resend OTP in <span id="timer">165</span> seconds...
      </div>

      <div class="verify-group">
        <button class="btn btn-red" onclick="cancelAction()">CANCEL</button>
        <button class="btn btn-green" onclick="verifyOTP()">VERIFY</button>
      </div>

    </div>

  </div>

</div>

<script>

let countdown;
let seconds = 165;
const timerEl = document.getElementById("timer");
const emailInput = document.getElementById("email");
const emailError = document.getElementById("emailError");

function clearEmail(){
  emailInput.value="";
  emailInput.classList.remove("input-error");
  emailError.style.display="none";
}

function isValidEmail(email){
  const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return pattern.test(email);
}

function sendOTP(){

  const email = emailInput.value.trim();

  // Empty check
  if(email === ""){
    emailError.textContent = "Please fill in your email address.";
    emailError.style.display = "block";
    emailInput.classList.add("input-error");
    return;
  }

  // Format check
  if(!isValidEmail(email)){
    emailError.textContent = "Please enter a valid email address.";
    emailError.style.display = "block";
    emailInput.classList.add("input-error");
    return;
  }

  // If valid
  emailError.style.display="none";
  emailInput.classList.remove("input-error");

  alert("OTP sent to " + email + " (simulation mode).");

  clearInterval(countdown);
  seconds = 165;
  timerEl.textContent = seconds;

  countdown = setInterval(()=>{
    seconds--;
    timerEl.textContent = seconds;

    if(seconds <= 0){
      clearInterval(countdown);
      timerEl.textContent = "0";
    }
  },1000);
}

function cancelAction(){
  alert("Cancelled (monitor mode).");
}

function verifyOTP(){
  alert("OTP Verified (simulation).");
}

</script>

</body>
</html>
