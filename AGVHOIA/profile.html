<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#e5e5e5;
}

/* ================= HEADER ================= */
.header{
  height:90px;
  background:#e9e9e9;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.header-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.header-logo{
  width:115px;
  margin-left:-20px;
}

.header-left h2{
  color:#103703;
  font-weight:700;
  margin-left:100px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.search-container{
  display:flex;
  align-items:center;
  background:#82F65B33;
  padding:8px 15px;
  border-radius:25px;
  gap:10px;
  width:320px;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border:solid;
  border-color:#103703;
}

.search-container input{
  border:none;
  background:transparent;
  outline:none;
  width:100%;
}

.search-icon,
.search-close{
  width:18px;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon-circle{
  width:45px;
  height:45px;
  background:#D9D9D9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border:solid;
  border-color:#82F65B;
}

.icon-circle img{
  width:35px;
}

/* ================= LAYOUT ================= */
.container{
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  background:#eeeeee;
  height:calc(100vh - 90px);
  padding:30px 15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #dcdcdc;
}

.sidebar-menu{
  flex:1;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-radius:20px;
  margin-bottom:20px;
  cursor:pointer;
  font-size:15px;
  transition:0.2s ease;
}

.menu-item img{
  width:28px;
}

.menu-item span{
  font-weight:500;
  color:#2f2f2f;
}

.menu-item:hover{
  background:#d7f0d4;
}

.menu-item.active{
  background:#cfe9c9;
  font-weight:600;
  box-shadow:0 4px 8px rgba(0,0,0,0.12);
}

.sidebar-logout{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-top:1px solid #dcdcdc;
  cursor:pointer;
}

.sidebar-logout img{
  width:28px;
  height:28px;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:40px;
}

/* ================= PROFILE ================= */
.profile-container{
  background:#f4f4f4;
  padding:40px;
  border-radius:25px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.profile-layout{
  display:flex;
  gap:60px;
  align-items:stretch;
}

.profile-left{
  width:40%;
  display:flex;
  flex-direction:column;
}

.profile-right{
  width:60%;
  display:flex;
  flex-direction:column;
}

.profile-left h3{
  text-align:left;
  margin-bottom:20px;
  color:#1b4d1b;
}

.profile-image{
  width:250px;
  height:250px;
  border-radius:50%;
  border:3px solid #7ac36a;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ddd;
  position:relative;
}

.profile-image img{
  width:100%;
  height:100%;
  object-fit:cover;     /* fills circle properly */
  border-radius:50%;    /* ensures circle crop */
}

/* CLICKABLE EDIT ICON */
.edit-icon{
  position:absolute;
  right:-5px;
  top:20px;
  background:#1b4d1b;
  width:40px;
  height:40px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.edit-icon img{
  width:20px;
  height:20px;
  object-fit:contain;
  filter: brightness(0) invert(1);  /* makes icon white */
}
.badge{
  margin-top:25px;
  background:#e0e0e0;
  padding:12px;
  border-radius:15px;
  box-shadow:0 4px 8px rgba(0,0,0,0.15);
  font-weight:500;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.profile-note{
  margin-top:auto;
  font-size:13px;
  color:#666;
  text-align:left;
}

.input-group{
  margin-bottom:18px;
  position:relative;
}

.input-group input,
.input-group select{
  width:100%;
  padding:14px 45px 14px 20px;
  border-radius:18px;
  border:1px solid #ccc;
  outline:none;
  background:#ededed;
  box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

select{
  appearance:none;
}

input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0;
  display:none;
}

.input-group img.icon{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  cursor:pointer;
  filter: invert(23%) sepia(77%) saturate(540%) hue-rotate(72deg) brightness(60%) contrast(90%);
}

.row-2{
  display:flex;
  gap:20px;
}

.action-buttons{
  margin-top:auto;
  display:flex;
  justify-content:flex-end;
  gap:20px;
}

.cancel-btn,
.save-btn{
  padding:10px 30px;
  border-radius:25px;
  border:none;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.cancel-btn{
  background:#1b4d1b;
  color:white;
}

.save-btn{
  background:#0f3d0f;
  color:white;
}

.logout-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.logout-modal.active{
  visibility:visible;
  opacity:1;
}

.logout-box{
  width:520px;
  background:#e8e8e8;
  border-radius:20px;
  padding:40px;
  text-align:center;
  border:3px solid #7CFF57;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.logout-box h2{
  color:#103703;
  margin-bottom:25px;
}

.logout-logo{
  width:230px;
  margin-bottom:15px;
}

.logout-buttons{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.logout-buttons button{
  border:solid;
  border-color:white;
  padding:12px 35px;
  border-radius:25px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
}

.btn-yes{
  background:#0f3d00;
  color:white;
}

.btn-no{
  background:#ff3b3b;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="img/antel-logo.png" class="header-logo">
    <h2>Settings</h2>
  </div>

  <div class="header-right">
    <div class="search-container">
      <img src="img/Search.png" class="search-icon">
      <input type="text" placeholder="Search">
      <img src="img/ex-button.png" class="search-close">
    </div>

    <div class="header-icons">
      <div class="icon-circle"><img src="img/Ring bell.png"></div>
      <div class="icon-circle"><img src="img/profile-logo.png"></div>
    </div>
  </div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-menu">

    <a href="dashboard.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item"><img src="img/Dashboard.png"><span>Dashboard</span></div>
    </a>

    <a href="monthly-bills.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item"><img src="img/Due Bill.png"><span>Monthly Bills</span></div>
    </a>

    <a href="book-appointment.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item"><img src="img/Book apoinment.png"><span>Book Appointment</span></div>
    </a>

    <a href="memberships.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item"><img src="img/Memberships.png"><span>Memberships</span></div>
    </a>

    <a href="concerns.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item"><img src="img/Personal Info.png"><span>Other Concerns</span></div>
    </a>

    <a href="help.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item"><img src="img/Help.png"><span>Help</span></div>
    </a>

    <a href="settings.html" style="text-decoration:none;color:inherit;">
      <div class="menu-item active"><img src="img/Settings.png"><span>Settings</span></div>
    </a>

  </div>

  <div class="sidebar-logout" id="logoutBtn">
  <img src="img/logout-button.png"><span>Logout</span>
</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="profile-container">
    <div class="profile-layout">

      <div class="profile-left">
        <h3>My Profile</h3>
        <div class="profile-image">
          <img src="img/profile-logo.png" id="profilePreview">

          <div class="edit-icon" onclick="document.getElementById('profileUpload').click()">
            <img src="img/edit-button.png" alt="Edit">
          </div>

          <input type="file" id="profileUpload" accept="image/*" style="display:none">
        </div>

        <div class="badge">AGVHOAI</div>

        <div class="profile-note">
          Note: To change Village/Block/Lot/Ref No., contact AGV Admin or book an appointment.
        </div>
      </div>

      <div class="profile-right">

        <div class="input-group"><input type="text" placeholder="Given Name"></div>
        <div class="input-group"><input type="text" placeholder="Surname"></div>

        <div class="input-group">
          <select>
            <option>Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
          <img src="img/dropdown-logo.png" class="icon">
        </div>

        <div class="input-group"><input type="text" placeholder="Contact No."></div>
        <div class="input-group"><input type="text" placeholder="Citizenship"></div>

        <div class="input-group">
          <input type="date">
          <img src="img/calendar-logo.png" class="icon">
        </div>

        <div class="input-group">
          <select>
            <option>Village</option>
            <option>Village 1</option>
            <option>Village 2</option>
          </select>
          <img src="img/dropdown-logo.png" class="icon">
        </div>

        <div class="row-2">
          <div class="input-group"><input type="text" placeholder="Block"></div>
          <div class="input-group"><input type="text" placeholder="Lot"></div>
        </div>

        <div class="input-group"><input type="text" placeholder="Reference Number"></div>

        <div class="action-buttons">
          <button class="cancel-btn">CANCEL</button>
          <button class="save-btn">SAVE</button>
        </div>

      </div>

    </div>
  </div>
</div>

</div>

<div class="logout-modal" id="logoutModal">
  <div class="logout-box">
    <h2>Would you like to Logout?</h2>
    <img src="img/antel-logo.png" class="logout-logo">
    <div class="logout-buttons">
      <button class="btn-yes" onclick="confirmLogout()">YES</button>
      <button class="btn-no" onclick="closeLogout()">NO</button>
    </div>
  </div>
</div>

<script>
const logoutBtn = document.getElementById("logoutBtn");
const logoutModal = document.getElementById("logoutModal");

logoutBtn.onclick = function(){
  logoutModal.classList.add("active");
}

function closeLogout(){
  logoutModal.classList.remove("active");
}

function confirmLogout(){
  window.location.href="login.html";
}

const uploadInput = document.getElementById("profileUpload");
const preview = document.getElementById("profilePreview");

uploadInput.addEventListener("change", function(){
  const file = this.files[0];

  if(file){
    if(!file.type.startsWith("image/")){
      alert("Please upload image files only.");
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e){
      preview.src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
});
</script>

</body>
</html>
