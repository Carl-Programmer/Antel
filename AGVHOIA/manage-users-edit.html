<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users - Edit</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#e5e5e5;
height:100vh;
overflow:hidden;
}

/* HEADER */

.header{
height:90px;
background:#e9e9e9;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.header-left{
display:flex;
align-items:center;
gap:20px;
}

.header-logo{
width:115px;
margin-left:-20px;
}

.header-left h2{
color:#103703;
font-weight:700;
margin-left:100px;
}

.header-right{
display:flex;
align-items:center;
gap:20px;
}

.search-container{
display:flex;
align-items:center;
background:#82F65B33;
padding:8px 15px;
border-radius:25px;
gap:10px;
width:320px;
box-shadow:0 3px 6px rgba(0,0,0,0.15);
border:solid #103703;
}

.search-container input{
border:none;
background:transparent;
outline:none;
width:100%;
}

.search-icon,
.search-close{
width:18px;
}

.header-icons{
display:flex;
align-items:center;
gap:12px;
}

.icon-circle{
width:45px;
height:45px;
background:#D9D9D9;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 3px 6px rgba(0,0,0,0.15);
border:solid #82F65B;
}

.icon-circle img{
width:35px;
}

/* LAYOUT */

.container{
display:flex;
height:calc(100vh - 90px);
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#eeeeee;
padding:30px 15px;
display:flex;
flex-direction:column;
border-right:1px solid #dcdcdc;
}

.sidebar-menu{
flex:1;
}

.menu-item{
display:flex;
align-items:center;
gap:15px;
padding:14px 18px;
border-radius:20px;
margin-bottom:20px;
cursor:pointer;
font-size:15px;
transition:0.2s ease;
}

.menu-item img{
width:28px;
}

.menu-item span{
font-weight:500;
color:#2f2f2f;
}

.menu-item:hover{
background:#d7f0d4;
}

.menu-item.active{
background:#cfe9c9;
font-weight:600;
box-shadow:0 4px 8px rgba(0,0,0,0.12);
}

.sidebar-logout{
display:flex;
align-items:center;
gap:15px;
padding:14px 18px;
border-top:1px solid #dcdcdc;
cursor:pointer;
}

.sidebar-logout img{
width:26px;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* FORM */

.form-wrapper{
background:#f4f4f4;
border-radius:22px;
padding:40px;
height:100%;
box-shadow:0 6px 14px rgba(0,0,0,0.15);
position:relative;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:70px;
}

.section-title{
font-size:18px;
font-weight:600;
color:#1b4d1b;
margin-bottom:15px;
}

.form-group{
margin-bottom:15px;
position:relative;
}

.form-group input,
.form-group select{
width:100%;
padding:12px 40px 12px 15px;
border-radius:14px;
border:none;
background:#e6e6e6;
box-shadow:0 3px 6px rgba(0,0,0,0.15);
outline:none;
}

/* REMOVE DEFAULT DROPDOWN */

select{
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
}

/* REMOVE DEFAULT CALENDAR ICON */

input[type="date"]::-webkit-calendar-picker-indicator{
opacity:0;
cursor:pointer;
}

/* ICONS */

.field-icon{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
width:18px;
cursor:pointer;
}

/* SMALL GRID */

.small-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* BUTTON AREA */

.button-area{
position:absolute;
right:40px;
bottom:40px;
display:flex;
flex-direction:column;
align-items:flex-end;
gap:15px;
}

.button-group{
display:flex;
gap:15px;
}

/* BUTTONS */

.btn{
padding:12px 30px;
border-radius:25px;
border:none;
font-weight:600;
cursor:pointer;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
display:flex;
align-items:center;
gap:10px;
}

.btn-cancel{
background:#0f3d00;
color:white;
}

.btn-save{
background:#7CFF57;
color:white;
}

.btn-archive{
background:#FFD100;
color:#333;
padding:14px 35px;
}

.btn-archive img{
width:20px;
}

</style>
</head>

<body>

<div class="header">

<div class="header-left">
<img src="img/antel-logo.png" class="header-logo">
<h2>Manage Users - Edit</h2>
</div>

<div class="header-right">

<div class="search-container">
<img src="img/Search.png" class="search-icon">
<input type="text" placeholder="Search">
<img src="img/ex-button.png" class="search-close">
</div>

<div class="header-icons">
<div class="icon-circle"><img src="img/Ring bell.png"></div>
<div class="icon-circle"><img src="img/profile-logo.png"></div>
</div>

</div>
</div>

<div class="container">

<div class="sidebar">

<div class="sidebar-menu">

<div class="menu-item">
<img src="img/Dashboard.png">
<span>Dashboard</span>
</div>

<div class="menu-item active">
<img src="img/Due Bill.png">
<span>Manage Users</span>
</div>

<div class="menu-item">
<img src="img/Book apoinment.png">
<span>Manage Monthly Bills</span>
</div>

<div class="menu-item">
<img src="img/Memberships.png">
<span>Manage Appointment</span>
</div>

<div class="menu-item">
<img src="img/Personal Info.png">
<span>Manage Memberships</span>
</div>

<div class="menu-item">
<img src="img/Help.png">
<span>Other Concerns</span>
</div>

<div class="menu-item">
<img src="img/Settings.png">
<span>Feedbacks</span>
</div>

</div>

<div class="sidebar-logout">
<img src="img/logout-button.png">
<span>Logout</span>
</div>

</div>

<div class="main">

<div class="form-wrapper">

<div class="form-grid">

<div>

<div class="section-title">I. Personal Information</div>

<div class="form-group">
<input type="text" placeholder="Given Name">
</div>

<div class="form-group">
<input type="text" placeholder="Surname">
</div>

<div class="form-group">
<select id="gender">
<option>Gender</option>
<option>Male</option>
<option>Female</option>
</select>
<img src="img/dropdown-logo.png" class="field-icon" onclick="openDropdown('gender')">
</div>

<div class="form-group">
<input type="text" placeholder="Contact No.">
</div>

<div class="form-group">
<input type="text" placeholder="Citizenship">
</div>

<div class="form-group">
<input type="date" id="birthdate">
<img src="img/calendar-logo.png" class="field-icon" onclick="openCalendar()">
</div>

<div class="form-group">
<select id="village">
<option>Village</option>
<option>Grand Flores</option>
<option>Grand Catalina</option>
<option>Grand Meadows</option>
</select>
<img src="img/dropdown-logo.png" class="field-icon" onclick="openDropdown('village')">
</div>

<div class="small-grid">

<div class="form-group">
<input type="text" placeholder="Block">
</div>

<div class="form-group">
<input type="text" placeholder="Lot">
</div>

</div>

<div class="form-group">
<input type="text" placeholder="Reference Number">
</div>

</div>

<div>

<div class="section-title">II. Ownership Type</div>

<div class="form-group">
<select id="ownership">
<option>Homeowner</option>
<option>Tenant</option>
</select>
<img src="img/dropdown-logo.png" class="field-icon" onclick="openDropdown('ownership')">
</div>

</div>

</div>

<div class="button-area">

<div class="button-group">
<button class="btn btn-cancel">Cancel</button>
<button class="btn btn-save">Save Changes</button>
</div>

<button class="btn btn-archive">
<img src="img/archive-logo.png">
Archive this Account
</button>

</div>

</div>

</div>

</div>

<script>

function openDropdown(id){
document.getElementById(id).focus();
document.getElementById(id).click();
}

function openCalendar(){
document.getElementById("birthdate").showPicker();
}

</script>

</body>
</html>
