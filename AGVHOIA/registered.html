<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#e9e9e9;
  height:120px;
  padding:0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  overflow:hidden;
}

.logo-container{
  height:100%;
  display:flex;
  align-items:center;
}

.logo-container img{
  height:150px;
  width:auto;
  object-fit:contain;
}

.signup-title{
  font-size:26px;
  font-weight:700;
  color:#1b4d1b;
}

/* PROGRESS */
.progress-container{
  width:70%;
  margin:30px auto;
}

.progress-bar{
  height:18px;
  background:#dcdcdc;
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  width:100%; /* FULL PROGRESS */
  height:100%;
  background:linear-gradient(to right,#76ff7a,#1e7d1e);
  transition:0.4s ease;
}

.progress-steps{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:14px;
  align-items:center;
}

.step{
  display:flex;
  align-items:center;
  gap:6px;
  color:#1e7d1e;
}

.step img{
  width:18px;
  height:18px;
}

/* CARD */
.card{
  width:80%;
  margin:auto;
  background:white;
  padding:80px 40px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  min-height:500px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.success-title{
  font-size:35px;
  font-weight:700;
  color:#1b4d1b;
  margin-bottom:10px;
}

.success-sub{
  font-size:16px;
  margin-bottom:25px;
}

.redirect-text{
  font-size:15px;
  margin-bottom:30px;
}

.login-btn{
  padding:12px 30px;
  border:none;
  border-radius:25px;
  background:#0b3d0b;
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.login-btn:hover{
  background:#145214;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-container">
    <img src="img/antel-logo.png" alt="">
  </div>
  <div class="signup-title">SIGN UP</div>
</div>

<!-- PROGRESS -->
<div class="progress-container">
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <div class="progress-steps">
    <div class="step">
      <img src="img/one-logo.png" alt="">
      <span>Registration</span>
    </div>

    <div class="step">
      <img src="img/two-logo.png" alt="">
      <span>Verification</span>
    </div>

    <div class="step">
      <img src="img/three-logo.png" alt="">
      <span>Registered</span>
    </div>
  </div>
</div>

<!-- SUCCESS CONTENT -->
<div class="card">

  <div class="success-title">
    Congratulations!
  </div>

  <div class="success-sub">
    You can now open your account.
  </div>

  <div class="redirect-text">
    Redirecting you in <span id="countdown">5</span> seconds...
  </div>

  <button class="login-btn" onclick="goToLogin()">
    GO TO LOGIN PAGE
  </button>

</div>

<script>
let seconds = 5;
const countdownEl = document.getElementById("countdown");

const timer = setInterval(() => {
  seconds--;
  countdownEl.textContent = seconds;

  if(seconds <= 0){
    clearInterval(timer);
    window.location.href = "login.html"; // change if needed
  }
}, 1000);

function goToLogin(){
  window.location.href = "login.html"; // change if needed
}
</script>

</body>
</html>
