<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#e9e9e9;
  height:120px;
  padding:0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  overflow:hidden;
}

.logo-container{
  height:100%;
  display:flex;
  align-items:center;
}

.logo-container img{
  height:150px;
  width:auto;
  object-fit:contain;
}

.signup-title{
  font-size:26px;
  font-weight:700;
  color:#1b4d1b;
}

/* PROGRESS */
.progress-container{
  width:70%;
  margin:30px auto;
}

.progress-bar{
  height:18px;
  background:#dcdcdc;
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  width:66%;
  height:100%;
  background:linear-gradient(to right,#76ff7a,#1e7d1e);
}

.progress-steps{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:14px;
  align-items:center;
}

.step{
  display:flex;
  align-items:center;
  gap:6px;
  color:#1e7d1e;
}

.step img{
  width:18px;
  height:18px;
}

/* CARD */
.card{
  width:80%;
  margin:auto;
  background:white;
  padding:60px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  min-height:550px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* 🔥 LOADER */
.loader-container{
  margin-bottom:25px;
}

.loader-container img{
  width:70px;
  height:70px;
  animation: spin 1.5s linear infinite;
}

/* ROTATION */
@keyframes spin{
  0%{ transform: rotate(0deg); }
  100%{ transform: rotate(360deg); }
}

.waiting-title{
  font-size:22px;
  font-weight:600;
  color:#1b4d1b;
  margin-bottom:30px;
  text-align:center;
}

.message-box{
  width:500px;
  max-width:100%;
  
}

.message-box textarea{
  width:100%;
  height:120px;
  border-radius:15px;
  border:1px solid #ccc;
  padding:15px;
  resize:none;
  outline:none;
  font-size:14px;
  box-shadow:0 3px 6px rgba(0,0,0,0.1);
  
}

.submit-btn{
  margin-top:20px;
  margin-left: 400px;
  padding:10px 30px;
  border:solid;
  border-color: white;
  border-radius:25px;
  background:#0b3d0b;
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.submit-btn:hover{
  background:#145214;
}

.footer-note{
  margin-top:40px;
  margin-right: 700px;
  font-size:12px;
  color:#888;
}

@media(max-width:900px){
  .card{
    padding:30px;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-container">
    <img src="img/antel-logo.png" alt="">
  </div>
  <div class="signup-title">SIGN UP</div>
</div>

<!-- PROGRESS -->
<div class="progress-container">
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <div class="progress-steps">
    <div class="step">
      <img src="img/one-logo.png" alt="">
      <span>Registration</span>
    </div>

    <div class="step">
      <img src="img/two-logo.png" alt="">
      <span>Verification</span>
    </div>

    <div class="step">
      <img src="img/three-logo.png" alt="">
      <span>Registered</span>
    </div>
  </div>
</div>

<!-- VERIFICATION CONTENT -->
<div class="card">

  <!-- 🔥 LOADING IMAGE (PUT YOUR IMAGE HERE) -->
  <div class="loader-container">
    <img src="img/loading-logo.png" alt="Loading">
  </div>

  <div class="waiting-title">
    Waiting for admin to verify your account...
  </div>

  <div class="message-box">
    <textarea placeholder="Send us a message if no response in 5 minutes."></textarea>
  </div>

  <button class="submit-btn" onclick="sendMessage()">SUBMIT</button>

  <div class="footer-note">
    Note: It is advisable to create an account from 8:00AM to 4:30PM to get verified real time.
  </div>

</div>

<script>
function sendMessage(){
  alert("Message sent to admin!");
}
</script>

</body>
</html>
