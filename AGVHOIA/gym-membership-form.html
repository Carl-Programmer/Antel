<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memberships</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#e5e5e5;
  overflow:hidden;
}

/* ================= HEADER ================= */
.header{
  height:90px;
  background:#e9e9e9;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.header-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.header-logo{
  width:115px;
  margin-left:-20px;
}

.header-left h2{
  color:#103703;
  font-weight:700;
  margin-left:100px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.search-container{
  display:flex;
  align-items:center;
  background:#82F65B33;
  padding:6px 14px;
  border-radius:25px;
  gap:10px;
  width:260px;
  height:40px;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border: solid;
  border-color: #103703;
}

.search-container input{
  border:none;
  background:transparent;
  outline:none;
  width:100%;
  font-size:14px;
}

.search-icon,
.search-close{
  width:16px;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon-circle{
  width:45px;
  height:45px;
  background:#D9D9D9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
  border: solid;
  border-color: #82F65B;
}

.icon-circle img{
  width:35px;
}

/* ================= LAYOUT ================= */
.container{
  display:flex;
  height:calc(100vh - 90px);
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  background:#eeeeee;
  height:calc(100vh - 90px);
  padding:30px 15px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #dcdcdc;
}

.sidebar-menu{
  flex:1;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-radius:20px;
  margin-bottom:20px;
  cursor:pointer;
  font-size:15px;
  transition:0.2s ease;
}

.menu-item img{
  width:28px;
}

.menu-item span{
  font-weight:500;
  color:#2f2f2f;
}

.menu-item:hover{
  background:#d7f0d4;
}

.menu-item.active{
  background:#cfe9c9;
  font-weight:600;
  box-shadow:0 4px 8px rgba(0,0,0,0.12);
}

.sidebar-logout{
  display:flex;
  align-items:center;
  gap:15px;
  padding:14px 18px;
  border-top:1px solid #dcdcdc;
  cursor:pointer;
}

.sidebar-logout img{
  width:26px;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:30px;
  overflow-y:auto;
}

/* ================= MEMBERSHIP FORM ================= */
.membership-card{
  background:#f4f4f4;
  border-radius:22px;
  padding:30px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.membership-title{
  font-size:22px;
  font-weight:700;
  color:#1b4d1b;
  margin-bottom:25px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 0.9fr;
  gap:40px;
}

.section-title{
  font-weight:600;
  margin:35px 0 15px 0;
  color:#1b4d1b;
}

input{
  width:100%;
  padding:10px 15px;
  border-radius:20px;
  border:1px solid #ccc;
  margin-bottom:12px;
}

.row{
  display:flex;
  gap:10px;
}

/* ===== FIXED GREEN CALENDAR (CLICKABLE) ===== */
input[type="date"]{
  padding-right:40px;
  background: url('calendar-logo.png') no-repeat right 15px center;
  background-size:18px;
  cursor:pointer;
  position:relative;
}

input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0;
  position:absolute;
  right:0;
  width:100%;
  height:100%;
  cursor:pointer;
}

/* ================= UPLOAD DESIGN ================= */
.upload-box{
  width:340px;
  height:280px;
  border-radius:35px;
  box-shadow:0 10px 20px rgba(0,0,0,0.18);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  margin-top:35px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  background:#ffffff;
}

.upload-box input{
  display:none;
}

.upload-preview{
  width:160px;
  height:160px;
  border-radius:20px;
  object-fit:cover;
  display:none;
}

/* ================= ACTION BUTTONS ================= */
.actions{
  margin-top:30px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:18px;
}

.btn-delete{
  width:55px;
  height:55px;
  border-radius:30%;
  border:solid;
  border-color:#F83A3A;
  background:#ffffff;
  box-shadow:0 4px 8px rgba(0,0,0,0.15);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-delete img{
  width:28px;
}

.btn-next{
  height:55px;
  padding:0 40px;
  border-radius:30px;
  border:3px solid #FFFFFF;
  background:#103703;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 8px rgba(0,0,0,0.15);
}

  .logout-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.logout-modal.active{
  visibility:visible;
  opacity:1;
}

.logout-box{
  width:520px;
  background:#e8e8e8;
  border-radius:20px;
  padding:40px;
  text-align:center;
  border:3px solid #7CFF57;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.logout-box h2{
  color:#103703;
  margin-bottom:25px;
}

.logout-logo{
  width:230px;
  margin-bottom:15px;
}

.logout-buttons{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.logout-buttons button{
  border:solid;
  border-color:white;
  padding:12px 35px;
  border-radius:25px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
}

.btn-yes{
  background:#0f3d00;
  color:white;
}

.btn-no{
  background:#ff3b3b;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="img/antel-logo.png" class="header-logo">
    <h2>Memberships</h2>
  </div>

  <div class="header-right">
    <div class="search-container">
      <img src="img/Search.png" class="search-icon">
      <input type="text" placeholder="Search">
      <img src="img/ex-button.png" class="search-close">
    </div>

    <div class="header-icons">
      <div class="icon-circle"><img src="img/Ring bell.png "></div>
      <div class="icon-circle"><img src="img/profile-logo.png"></div>
    </div>
  </div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-menu">
    <a href="dashboard.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item"><img src="img/Dashboard.png"><span>Dashboard</span></div>
    </a>
    <a href="monthly-bills.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item"><img src="img/Due Bill.png"><span>Monthly Bills</span></div>
    </a>
    <a href="book-appointment.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item"><img src="img/Book apoinment.png"><span>Book Appointment</span></div>
    </a>
    <a href="memberships.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item active"><img src="img/Memberships.png"><span>Memberships</span></div>
    </a>
    <a href="concerns.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item"><img src="Img/Personal Info.png"><span>Other Concerns</span></div>
    </a>
    <a href="help.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item"><img src="IMG/Help.png"><span>Help</span></div>
    </a>
    <a href="settings.html" style="text-decoration:none; color:inherit;">
      <div class="menu-item"><img src="img/Settings.png"><span>Settings</span></div>
    </a>
  </div>

  <div class="sidebar-logout" id="logoutBtn">
  <img src="img/logout-button.png"><span>Logout</span>
</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="membership-card">

    <div class="membership-title">
      <img src="img/Expired date.png" style="width:50px;">
      Fitness Station
    </div>

    <div class="form-grid">

      <div>
        <div class="section-title">I. Personal Information</div>
        <input type="text" placeholder="Given Name">
        <input type="text" placeholder="Surname">
        <input type="text" placeholder="Middle Name">
        <input type="text" placeholder="Citizenship">
        <input type="date">
        <input type="text" placeholder="Contact Details">

        <div class="section-title">II. Ownership Type & Address</div>
        <input type="text" placeholder="Legal Resident">
        <input type="text" placeholder="Village">

        <div class="row">
          <input type="text" placeholder="Block">
          <input type="text" placeholder="Lot">
        </div>

        <input type="text" placeholder="Reference No.">

        <div class="section-title">For Tenants Only</div>
        <div class="row">
          <input type="date">
          <input type="date">
        </div>
      </div>

      <div>
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
          <img id="preview" class="upload-preview">
          <div id="uploadContent">
            <div class="upload-icon">
              <img src="img/upload-button-green.png">
            </div>
            <div class="upload-text">
              Click or drag file to<br>upload 1×1 picture
            </div>
          </div>
        </div>

        <div style="margin-top:90px;">
          <div class="section-title">
            IN CASE OF EMERGENCY, NOTIFY:
          </div>
          <input type="text" placeholder="Full Name">
          <input type="text" placeholder="Contact No.">
        </div>
      </div>

    </div>

    <div class="actions">
      <button class="btn-delete" onclick="removeImage()">
        <img src="img/delete-button.png">
      </button>
      <a href="gym-membership-form2.html" style="text-decoration:none;">
  <button class="btn-next">Next</button>
</a>
    </div>

  </div>
</div>

</div>

<div class="logout-modal" id="logoutModal">
  <div class="logout-box">
    <h2>Would you like to Logout?</h2>
    <img src="img/antel-logo.png" class="logout-logo">
    <div class="logout-buttons">
      <button class="btn-yes" onclick="confirmLogout()">YES</button>
      <button class="btn-no" onclick="closeLogout()">NO</button>
    </div>
  </div>
</div>

<script>
const logoutBtn = document.getElementById("logoutBtn");
const logoutModal = document.getElementById("logoutModal");

logoutBtn.onclick = function(){
  logoutModal.classList.add("active");
}

function closeLogout(){
  logoutModal.classList.remove("active");
}

function confirmLogout(){
  window.location.href="login.html";
}

function previewImage(event){
  const input = event.target;
  const preview = document.getElementById("preview");
  const uploadContent = document.getElementById("uploadContent");

  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = function(e){
      preview.src = e.target.result;
      preview.style.display = "block";
      uploadContent.style.display = "none";
    }
    reader.readAsDataURL(input.files[0]);
  }
}

function removeImage(){
  const fileInput = document.getElementById("fileInput");
  const preview = document.getElementById("preview");
  const uploadContent = document.getElementById("uploadContent");

  fileInput.value = "";
  preview.src = "";
  preview.style.display = "none";
  uploadContent.style.display = "block";
}
</script>

</body>
</html>
